# Copy this file to inventory.ini and replace the placeholders.
# Keep passwords in Ansible Vault for production if possible.

[postgresql_servers]
pg01 ansible_host=<POSTGRESQL_IP> ansible_user=<SSH_USER> ansible_password=<SSH_PASSWORD>

[redis_servers]
redis01 ansible_host=<REDIS_IP> ansible_user=<SSH_USER> ansible_password=<SSH_PASSWORD>

[mongodb_servers]
mongo01 ansible_host=<MONGODB_IP> ansible_user=<SSH_USER> ansible_password=<SSH_PASSWORD>

[zookeeper_servers]
zk01 ansible_host=<ZOOKEEPER_IP> ansible_user=<SSH_USER> ansible_password=<SSH_PASSWORD>

[dolphinscheduler_servers]
ds01 ansible_host=<DOLPHINSCHEDULER_IP> ansible_user=<SSH_USER> ansible_password=<SSH_PASSWORD>

[datamaster_app_servers]
app01 ansible_host=<DATAMASTER_APP_IP> ansible_user=<SSH_USER> ansible_password=<SSH_PASSWORD>

[datamaster_quality_servers]
quality01 ansible_host=<DATAMASTER_QUALITY_IP> ansible_user=<SSH_USER> ansible_password=<SSH_PASSWORD>

[container_hosts:children]
postgresql_servers
redis_servers
mongodb_servers
datamaster_app_servers
datamaster_quality_servers

[physical_scheduler_hosts:children]
zookeeper_servers
dolphinscheduler_servers

[all:vars]
ansible_port=22
ansible_become=true
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3
